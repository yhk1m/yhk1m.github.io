<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>데이터 내보내기</title></head>
<body>
<h2>포트폴리오 데이터를 내보내는 중...</h2>
<p id="msg">잠시만 기다려주세요.</p>
<script>
const data = {
  hero: JSON.parse(localStorage.getItem('hub_mainHero')),
  bio: JSON.parse(localStorage.getItem('hub_mainBio')),
  projects: JSON.parse(localStorage.getItem('hub_mainProjects')),
  youtube: JSON.parse(localStorage.getItem('hub_mainYoutube')),
  contacts: JSON.parse(localStorage.getItem('hub_mainContacts'))
};
const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
const a = document.createElement('a');
a.href = URL.createObjectURL(blob);
a.download = 'site-data.json';
document.body.appendChild(a);
a.click();
document.getElementById('msg').textContent = '다운로드가 시작되었습니다. 이 페이지를 닫아도 됩니다.';
</script>
</body>
</html>
